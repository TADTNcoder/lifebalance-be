name: lifebalance

x-logging: &default-logging
  driver: json-file
  options:
    max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
    max-file: ${DOCKER_LOG_MAX_FILE:-5}

x-spring-service: &spring-service
  restart: unless-stopped
  networks:
    - lifebalance-internal
  logging: *default-logging
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness || curl -fsS http://localhost:8080/actuator/health || exit 1"]
    interval: 15s
    timeout: 5s
    retries: 12
    start_period: 60s
  deploy:
    resources:
      limits:
        cpus: "1.00"
        memory: 768M
      reservations:
        memory: 384M

services:
  postgres:
    image: postgres:16.4-alpine
    container_name: lifebalance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      KEYCLOAK_DB: ${KEYCLOAK_DB}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      IDENTITY_DB: ${IDENTITY_DB}
      IDENTITY_DB_USER: ${IDENTITY_DB_USER}
      IDENTITY_DB_PASSWORD: ${IDENTITY_DB_PASSWORD}
      TASK_DB: ${TASK_DB}
      TASK_DB_USER: ${TASK_DB_USER}
      TASK_DB_PASSWORD: ${TASK_DB_PASSWORD}
      TIMELINE_DB: ${TIMELINE_DB}
      TIMELINE_DB_USER: ${TIMELINE_DB_USER}
      TIMELINE_DB_PASSWORD: ${TIMELINE_DB_PASSWORD}
      FINANCE_DB: ${FINANCE_DB}
      FINANCE_DB_USER: ${FINANCE_DB_USER}
      FINANCE_DB_PASSWORD: ${FINANCE_DB_PASSWORD}
      NOTIFICATION_DB: ${NOTIFICATION_DB}
      NOTIFICATION_DB_USER: ${NOTIFICATION_DB_USER}
      NOTIFICATION_DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
      ANALYTICS_DB: ${ANALYTICS_DB}
      ANALYTICS_DB_USER: ${ANALYTICS_DB_USER}
      ANALYTICS_DB_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      AI_DB: ${AI_DB}
      AI_DB_USER: ${AI_DB_USER}
      AI_DB_PASSWORD: ${AI_DB_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./backups/postgres:/backups
    networks:
      - lifebalance-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.50"
          memory: 1G
        reservations:
          memory: 512M

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.4
    container_name: lifebalance-keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --health-enabled=true
      - --metrics-enabled=true
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${KEYCLOAK_HOST_PORT:-8082}:8080"
      - "${KEYCLOAK_MGMT_HOST_PORT:-9000}:9000"
    volumes:
      - ./docker/keycloak/realm:/opt/keycloak/data/import:ro
      - ./backups/keycloak:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lifebalance-internal
      - lifebalance-edge
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/9000; printf \"GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; cat <&3 | grep -q \"200 OK\"'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    logging: *default-logging

  discovery-server:
    <<: *spring-service
    image: lifebalance/discovery-server:${APP_VERSION:-dev}
    container_name: lifebalance-discovery-server
    build:
      context: .
      dockerfile: docker/spring/Dockerfile
      args:
        MODULE_NAME: discovery-server
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DISCOVERY_PORT: 8761
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
    ports:
      - "${DISCOVERY_HOST_PORT:-8761}:8761"
    networks:
      - lifebalance-internal
      - lifebalance-edge
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health/readiness || curl -fsS http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  gateway:
    <<: *spring-service
    image: lifebalance/gateway:${APP_VERSION:-dev}
    container_name: lifebalance-gateway
    build:
      context: .
      dockerfile: docker/spring/Dockerfile
      args:
        MODULE_NAME: gateway
    environment:
      SPRING_PROFILES_ACTIVE: dev
      GATEWAY_PORT: 8080
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI_INTERNAL}
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8080"
    depends_on:
      discovery-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - lifebalance-internal
      - lifebalance-edge

  identity-service:
    <<: *spring-service
    image: lifebalance/identity-service:${APP_VERSION:-dev}
    container_name: lifebalance-identity-service
    build:
      context: .
      dockerfile: docker/spring/Dockerfile
      args:
        MODULE_NAME: identity-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      IDENTITY_SERVICE_PORT: 8080
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${IDENTITY_DB}
      SPRING_DATASOURCE_USERNAME: ${IDENTITY_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${IDENTITY_DB_PASSWORD}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI_INTERNAL}
    expose:
      - "8080"
    volumes:
      - ./logs/identity:/logs
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  task-service:
    <<: *spring-service
    image: lifebalance/task-service:${APP_VERSION:-dev}
    container_name: lifebalance-task-service
    build:
      context: .
      dockerfile: docker/spring/Dockerfile
      args:
        MODULE_NAME: task-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      TASK_SERVICE_PORT: 8080
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${TASK_DB}
      SPRING_DATASOURCE_USERNAME: ${TASK_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${TASK_DB_PASSWORD}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI_INTERNAL}
    expose:
      - "8080"
    volumes:
      - ./logs/task:/logs
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  timeline-service:
    <<: *spring-service
    image: lifebalance/timeline-service:${APP_VERSION:-dev}
    container_name: lifebalance-timeline-service
    build:
      context: .
      dockerfile: docker/spring/Dockerfile
      args:
        MODULE_NAME: timeline-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      TIMELINE_SERVICE_PORT: 8080
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${TIMELINE_DB}
      SPRING_DATASOURCE_USERNAME: ${TIMELINE_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${TIMELINE_DB_PASSWORD}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI_INTERNAL}
    expose:
      - "8080"
    volumes:
      - ./logs/timeline:/logs
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  finance-service:
    <<: *spring-service
    image: lifebalance/finance-service:${APP_VERSION:-dev}
    container_name: lifebalance-finance-service
    build:
      context: .
      dockerfile: docker/spring/Dockerfile
      args:
        MODULE_NAME: finance-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      FINANCE_SERVICE_PORT: 8080
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${FINANCE_DB}
      SPRING_DATASOURCE_USERNAME: ${FINANCE_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${FINANCE_DB_PASSWORD}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI_INTERNAL}
    expose:
      - "8080"
    volumes:
      - ./logs/finance:/logs
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  notification-service:
    <<: *spring-service
    image: lifebalance/notification-service:${APP_VERSION:-dev}
    container_name: lifebalance-notification-service
    build:
      context: .
      dockerfile: docker/spring/Dockerfile
      args:
        MODULE_NAME: notification-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      NOTIFICATION_SERVICE_PORT: 8080
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${NOTIFICATION_DB}
      SPRING_DATASOURCE_USERNAME: ${NOTIFICATION_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI_INTERNAL}
    expose:
      - "8080"
    volumes:
      - ./logs/notification:/logs
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  analytics-service:
    <<: *spring-service
    image: lifebalance/analytics-service:${APP_VERSION:-dev}
    container_name: lifebalance-analytics-service
    build:
      context: .
      dockerfile: docker/spring/Dockerfile
      args:
        MODULE_NAME: analytics-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      ANALYTICS_SERVICE_PORT: 8080
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${ANALYTICS_DB}
      SPRING_DATASOURCE_USERNAME: ${ANALYTICS_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI_INTERNAL}
    expose:
      - "8080"
    volumes:
      - ./logs/analytics:/logs
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  ai-service:
    <<: *spring-service
    image: lifebalance/ai-service:${APP_VERSION:-dev}
    container_name: lifebalance-ai-service
    build:
      context: .
      dockerfile: docker/spring/Dockerfile
      args:
        MODULE_NAME: ai-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      AI_SERVICE_PORT: 8080
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${AI_DB}
      SPRING_DATASOURCE_USERNAME: ${AI_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${AI_DB_PASSWORD}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI_INTERNAL}
    expose:
      - "8080"
    volumes:
      - ./logs/ai:/logs
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  frontend:
    image: lifebalance/frontend:${APP_VERSION:-dev}
    container_name: lifebalance-frontend
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
        VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM}
        VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_FRONTEND_CLIENT_ID}
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:8080"
    depends_on:
      gateway:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - lifebalance-edge
      - lifebalance-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: lifebalance-rabbitmq
    profiles: ["messaging"]
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_AMQP_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_HOST_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - lifebalance-internal
      - lifebalance-edge
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging: *default-logging

  redis:
    image: redis:7.4-alpine
    container_name: lifebalance-redis
    profiles: ["cache"]
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - lifebalance-internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: lifebalance-minio
    profiles: ["storage"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_HOST_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - lifebalance-internal
      - lifebalance-edge
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging: *default-logging

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: lifebalance-prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - lifebalance-internal
      - lifebalance-edge
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.2.0
    container_name: lifebalance-grafana
    profiles: ["monitoring"]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - lifebalance-internal
      - lifebalance-edge
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging: *default-logging

networks:
  lifebalance-edge:
    name: lifebalance-edge
    driver: bridge
  lifebalance-internal:
    name: lifebalance-internal
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
  minio-data:
  prometheus-data:
  grafana-data:
