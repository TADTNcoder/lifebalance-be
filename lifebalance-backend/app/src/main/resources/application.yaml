server:
  shutdown: graceful
  forward-headers-strategy: framework

spring:
  profiles:
    default: local

  application:
    name: lifebalance-app

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: LifeBalance App
    version: 1.0.0
    description: Modular monolith MVC API

logging:
  level:
    root: INFO
    com.lifebalance.app: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger - %msg%n"
