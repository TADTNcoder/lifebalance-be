server:
  shutdown: graceful
  forward-headers-strategy: framework

spring:
  profiles:
    default: local

  application:
    name: finance-service

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      probes:
        enabled: true

lifebalance:
  security:
    keycloak:
      client-id: ${KEYCLOAK_CLIENT_ID:lifebalance-api}

info:
  app:
    name: LifeBalance Finance Service
    version: 1.0.0
    description: Finance, budget, and transaction API

logging:
  level:
    root: INFO
    com.lifebalance.finance: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger - %msg%n"
