global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: discovery-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["discovery-server:8761"]

  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: identity-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["identity-service:8080"]

  - job_name: task-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["task-service:8080"]

  - job_name: timeline-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["timeline-service:8080"]

  - job_name: finance-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["finance-service:8080"]

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["notification-service:8080"]

  - job_name: analytics-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["analytics-service:8080"]

  - job_name: ai-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["ai-service:8080"]
